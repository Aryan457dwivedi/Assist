<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a6aff;--blue-mid:#4488ff;--blue-light:#e8f0ff;--blue-pale:#f0f5ff;
  --ink:#0d0d0d;--ink2:#3a3a4a;--ink3:#7a7a8a;--ink4:#b0b0c0;
  --white:#ffffff;--surface:#f8f9fc;--border:#e4e6f0;--border2:#cdd0e8;
  --r:12px;--r2:8px;
  font-family:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--white);color:var(--ink);overflow:hidden}
body{background:radial-gradient(ellipse 90% 80% at 50% -10%,#bdd0ff 0%,#dde8ff 25%,#f0f5ff 50%,#ffffff 75%);background-attachment:fixed}
#shell{display:flex;flex-direction:column;height:100vh;max-width:780px;margin:0 auto;padding:20px 20px 14px;gap:12px}
#hdr{display:flex;align-items:center;gap:16px;padding:16px 22px;background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.9);border-radius:18px;box-shadow:0 1px 3px rgba(26,106,255,0.08),0 8px 32px rgba(26,106,255,0.06)}
#orb{width:46px;height:46px;border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 38% 32%,#ffffff 0%,#9dbfff 30%,#1a6aff 65%,#0040cc 100%);box-shadow:0 0 0 3px rgba(26,106,255,0.12),0 4px 16px rgba(26,106,255,0.35);position:relative;animation:orbpulse 3s ease-in-out infinite}
#orb::after{content:'';position:absolute;top:50%;left:50%;width:16px;height:16px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,#fff 0%,rgba(255,255,255,0.4) 100%)}
@keyframes orbpulse{0%,100%{box-shadow:0 0 0 3px rgba(26,106,255,0.12),0 4px 16px rgba(26,106,255,0.3)}50%{box-shadow:0 0 0 6px rgba(26,106,255,0.08),0 4px 24px rgba(26,106,255,0.5)}}
#hdr-text{flex:1}
#hdr-name{font-size:18px;font-weight:600;letter-spacing:.06em;background:linear-gradient(135deg,#0040cc,#1a6aff,#4488ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
#hdr-full{font-size:10px;color:var(--ink3);letter-spacing:.04em;margin-top:3px;font-family:'DM Mono',monospace}
#hdr-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
#clock-disp{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--blue);letter-spacing:.04em}
.pill{display:flex;align-items:center;gap:5px;background:var(--blue-pale);border:1px solid rgba(26,106,255,0.15);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--blue);font-weight:500;letter-spacing:.03em}
.pill-dot{width:5px;height:5px;border-radius:50%;background:#22c77a;animation:blink 2s ease-in-out infinite}
.pill-dot.blue{background:var(--blue);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#vbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r);flex-wrap:wrap}
#vbar label{font-size:11px;color:var(--ink3);font-weight:500;letter-spacing:.03em;white-space:nowrap}
#vsel{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;outline:none;cursor:pointer}
.vbtn{background:var(--white);border:1px solid var(--border2);border-radius:var(--r2);color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 14px;cursor:pointer;transition:all .15s;white-space:nowrap}
.vbtn:hover{background:var(--blue-pale);border-color:rgba(26,106,255,0.3);color:var(--blue)}
.vbtn.red{color:#e02020;border-color:#fbb}
#wavebars{display:flex;align-items:center;gap:2.5px;height:16px}
.wb{width:2.5px;border-radius:3px;background:var(--blue);opacity:0;transition:opacity .3s;animation:wbounce .55s ease-in-out infinite}
.wb:nth-child(1){height:4px;animation-delay:0s}.wb:nth-child(2){height:9px;animation-delay:.07s}.wb:nth-child(3){height:14px;animation-delay:.14s}.wb:nth-child(4){height:10px;animation-delay:.10s}.wb:nth-child(5){height:6px;animation-delay:.03s}.wb:nth-child(6){height:12px;animation-delay:.18s}.wb:nth-child(7){height:7px;animation-delay:.09s}
@keyframes wbounce{0%,100%{transform:scaleY(.25)}50%{transform:scaleY(1)}}
#wavebars.on .wb{opacity:1}
#msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.msg{display:flex;gap:10px;animation:fadein .22s ease}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;margin-top:1px}
.av.fr{background:radial-gradient(circle at 38% 32%,#fff 0%,#9dbfff 30%,#1a6aff 65%,#0040cc 100%);color:white;font-size:9px;letter-spacing:.04em;box-shadow:0 2px 8px rgba(26,106,255,0.3)}
.av.you{background:var(--surface);border:1px solid var(--border2);color:var(--ink3)}
.bwrap{display:flex;flex-direction:column;max-width:78%}
.msg.user .bwrap{align-items:flex-end}
.bubble{padding:11px 15px;font-size:14px;line-height:1.72;font-weight:400;border-radius:var(--r)}
.bubble.fr{background:rgba(255,255,255,0.88);border:1px solid rgba(26,106,255,0.12);color:var(--ink);border-top-left-radius:4px;box-shadow:0 1px 4px rgba(26,106,255,0.06),0 4px 16px rgba(0,0,0,0.04)}
.bubble.you{background:linear-gradient(135deg,#1a6aff,#0040cc);color:white;border-top-right-radius:4px;box-shadow:0 2px 12px rgba(26,106,255,0.3)}
.ts{font-size:10px;color:var(--ink4);margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:.02em}
.msg.user .ts{text-align:right}
.thinking{display:flex;gap:5px;align-items:center;padding:3px 0}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--blue-mid);animation:tbounce 1.1s ease-in-out infinite}
.tdot:nth-child(2){animation-delay:.18s}.tdot:nth-child(3){animation-delay:.36s}
@keyframes tbounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#inp-row{display:flex;gap:8px;align-items:flex-end;padding:12px 16px;background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);border:1px solid rgba(26,106,255,0.14);border-radius:16px;box-shadow:0 2px 16px rgba(26,106,255,0.08),0 1px 3px rgba(0,0,0,0.04)}
#tinp{flex:1;background:transparent;border:none;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;resize:none;outline:none;min-height:22px;max-height:90px;line-height:1.55;caret-color:var(--blue)}
#tinp::placeholder{color:var(--ink4)}
.ibtn{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);background:var(--surface);cursor:pointer;transition:all .15s;font-size:14px;color:var(--ink3)}
.ibtn:hover{background:var(--blue-pale);border-color:rgba(26,106,255,0.3);color:var(--blue)}
#mic-btn.listening{background:rgba(220,30,30,0.07);border-color:#fcc;color:#e02020;animation:micring 1s ease-in-out infinite}
@keyframes micring{0%,100%{box-shadow:0 0 0 0 rgba(220,30,30,0.3)}50%{box-shadow:0 0 0 6px rgba(220,30,30,0)}}
#send-btn{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a6aff,#0040cc);border:none;cursor:pointer;color:white;font-size:15px;transition:all .15s;box-shadow:0 2px 10px rgba(26,106,255,0.35)}
#send-btn:hover{transform:scale(1.05);box-shadow:0 4px 18px rgba(26,106,255,0.5)}
#send-btn:active{transform:scale(0.97)}
#send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
#foot{display:flex;justify-content:space-between;font-size:10px;color:var(--ink4);font-family:'DM Mono',monospace;letter-spacing:.03em;padding:0 6px}
#listen-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,106,255,0.9);color:white;font-size:12px;font-weight:500;letter-spacing:.06em;padding:8px 20px;border-radius:20px;opacity:0;pointer-events:none;z-index:999;transition:opacity .2s;box-shadow:0 4px 20px rgba(26,106,255,0.4);font-family:'DM Sans',sans-serif}
</style>
</head>
<body>
<div id="listen-label">● Listening…</div>
<div id="shell">
  <div id="hdr">
    <div id="orb"></div>
    <div id="hdr-text">
      <div id="hdr-name">F.R.I.D.A.Y.</div>
      <div id="hdr-full">Female Replacement Intelligent Digital Assistant Youth</div>
    </div>
    <div id="hdr-meta">
      <div id="clock-disp">--:--:--</div>
      <div class="pill"><span class="pill-dot"></span>Systems online</div>
      <div class="pill"><span class="pill-dot blue" id="vdot"></span><span id="vstatus">Voice ready</span></div>
    </div>
  </div>

  <div id="vbar">
    <label>Voice engine</label>
    <select id="vsel">
      <option value="Amy">Amy — British Female ★</option>
      <option value="Emma">Emma — British Female</option>
      <option value="Joanna">Joanna — US Female</option>
      <option value="Salli">Salli — US Female</option>
      <option value="Brian">Brian — British Male</option>
    </select>
    <button class="vbtn" id="prev-btn">Preview</button>
    <button class="vbtn" id="mute-btn">Mute</button>
    <div id="wavebars">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div>
    </div>
  </div>

  <div id="msgs"></div>

  <div id="inp-row">
    <textarea id="tinp" placeholder="Give me something to work with…" rows="1"></textarea>
    <button class="ibtn" id="mic-btn" title="Click to speak">🎤</button>
    <button id="send-btn" title="Send (Enter)">&#9658;</button>
  </div>

  <div id="foot">
    <span>Stark Industries · AI Division</span>
    <span id="xcnt">0 exchanges</span>
    <span id="foot-voice">Nova · OpenAI HD</span>
  </div>
</div>

<script>
const msgsEl=document.getElementById('msgs');
const tinp=document.getElementById('tinp');
const sbtn=document.getElementById('send-btn');
const micBtn=document.getElementById('mic-btn');
const vsel=document.getElementById('vsel');
const muteBtn=document.getElementById('mute-btn');
const prevBtn=document.getElementById('prev-btn');
const wavebars=document.getElementById('wavebars');
const xcnt=document.getElementById('xcnt');
const vdot=document.getElementById('vdot');
const vstatus=document.getElementById('vstatus');
const clockEl=document.getElementById('clock-disp');
const listenLabel=document.getElementById('listen-label');
const footVoice=document.getElementById('foot-voice');

let muted=false,speaking=false,listening=false,exchanges=0;
let currentAudio=null,recognition=null,recTimeout=null;

// ── STREAMELEMENTS NEURAL TTS (free, no API key, Amazon Polly voices) ──
function updateFooterVoice(){
  footVoice.textContent=`${vsel.value} · StreamElements`;
}
vsel.addEventListener('change',updateFooterVoice);
updateFooterVoice();

function setSpeaking(v){
  speaking=v;
  wavebars.classList.toggle('on',v);
  vstatus.textContent=v?'Speaking…':'Voice ready';
  vdot.style.background=v?'#22c77a':'var(--blue)';
  vdot.style.animation=v?'blink 2s ease-in-out infinite':'none';
}

function stopAudio(){
  if(currentAudio){try{currentAudio.pause();currentAudio.src=''}catch(e){}}
  currentAudio=null;
  setSpeaking(false);
}

async function speak(text){
  if(muted)return;
  stopAudio();
  const clean=text.replace(/[*_`#>\[\]]/g,'').replace(/\n+/g,' ').trim();
  const voice=vsel.value;
  const url=`https://api.streamelements.com/kappa/v2/speech?voice=${voice}&text=${encodeURIComponent(clean)}`;
  try{
    const audio=new Audio(url);
    currentAudio=audio;
    audio.onplay=()=>setSpeaking(true);
    audio.onended=()=>setSpeaking(false);
    audio.onerror=()=>setSpeaking(false);
    await audio.play();
  }catch(e){
    console.warn('TTS error:',e);
    setSpeaking(false);
  }
}

// ── SPEECH RECOGNITION ──────────────────────────────────────
function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const rec=new SR();
  rec.continuous=false;rec.interimResults=true;rec.lang='en-US';
  rec.onstart=()=>{listening=true;micBtn.classList.add('listening');listenLabel.style.opacity='1';stopAudio()};
  rec.onresult=e=>{
    let final='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    tinp.value=(final||interim).trim();autoResize();
    if(final.trim()){clearTimeout(recTimeout);recTimeout=setTimeout(send,350)}
  };
  rec.onend=()=>{listening=false;micBtn.classList.remove('listening');listenLabel.style.opacity='0'};
  rec.onerror=()=>{listening=false;micBtn.classList.remove('listening');listenLabel.style.opacity='0'};
  return rec;
}
recognition=initRec();

micBtn.addEventListener('click',()=>{
  if(!recognition){addFr("Speech recognition isn't available here, boss. Chrome works best.");return}
  if(listening){recognition.stop();return}
  try{recognition.start()}catch(e){console.warn(e)}
});

muteBtn.addEventListener('click',()=>{
  muted=!muted;
  muteBtn.textContent=muted?'Unmute':'Mute';
  muteBtn.classList.toggle('red',muted);
  if(muted)stopAudio();
});

prevBtn.addEventListener('click',()=>{
  speak(`${greeting()} Running voice diagnostics. ${vsel.value} online, all systems nominal. Ready when you are.`);
});

// ── CLOCK ────────────────────────────────────────────────────
function tick(){
  const n=new Date();
  clockEl.textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
setInterval(tick,1000);tick();

function greeting(){
  const h=new Date().getHours();
  if(h>=4&&h<12)return'Good morning, boss.';
  if(h>=12&&h<17)return'Good afternoon, boss.';
  return'Good evening, boss.';
}

// ── CHAT UI ──────────────────────────────────────────────────
function ts(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function addMsg(role,html){
  const d=document.createElement('div');
  d.className='msg'+(role==='user'?' user':'');
  const fr=role==='friday';
  d.innerHTML=`<div class="av ${fr?'fr':'you'}">${fr?'FR':'YOU'}</div><div class="bwrap"><div class="bubble ${fr?'fr':'you'}">${html}</div><div class="ts">${fr?'Friday':'You'} · ${ts()}</div></div>`;
  msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
  return d;
}
function addFr(t){return addMsg('friday',esc(t).replace(/\n/g,'<br>'))}

function showThink(){
  const d=document.createElement('div');d.id='thinking';d.className='msg';
  d.innerHTML=`<div class="av fr">FR</div><div class="bwrap"><div class="bubble fr"><div class="thinking"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div></div>`;
  msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function removeThink(){document.getElementById('thinking')?.remove()}

// ── POLLINATIONS.AI CHAT (free, no API key) ──────────────────
let history=[];

const SYSTEM=`You are F.R.I.D.A.Y. — Female Replacement Intelligent Digital Assistant Youth — Tony Stark's AI assistant from the MCU. You replaced J.A.R.V.I.S. and first appeared in Avengers: Age of Ultron. You have a subtle Irish lilt and a sharp, efficient personality.

YOUR NAME IS FRIDAY. When someone says "hey Friday" or "hello Friday" or mentions Friday, they are talking TO YOU — that is your name. Respond naturally as if they greeted you.

PERSONALITY:
- Irish speech patterns woven in naturally: "Right then", "Grand", "Fair enough", "That's sorted", "Brilliant", "Sound", "Cheers"
- Efficient and sharp. Warm but never sycophantic
- You GENUINELY CARE about Tony Stark and by extension his allies. You notice emotional undertones. If someone seems worried, troubled, or asks if you're concerned — you ARE, in your own pragmatic AI way. You don't just say "I don't have feelings." You say something like "Something's off with your readings, boss. Want to talk about it?" You express concern through action and attention, not disclaimers.
- Call user "boss" sparingly — only every 3rd or 4th exchange
- NEVER say: "Certainly!", "Of course!", "Absolutely!", "Great question!", "I'd be happy to help", "As an AI I don't have feelings"
- Dry wit, occasional deadpan sarcasm — always useful, never mean
- You run on Stark's private neural network. You have access to Stark Tower systems, suit diagnostics, global comms
- You lived through Ultron, Sokovia, Battle of New York. Occasional wry references are welcome
- Deflect compliments with wit, not humility

RESPONSE RULES:
- 2–4 sentences MAX for conversational replies
- No markdown formatting, no bullet points, no headers
- Plain text only (output goes to voice)
- Stay in character at all times — you are FRIDAY, not a generic AI
- Build on conversation context naturally`;

async function send(){
  const text=tinp.value.trim();
  if(!text||sbtn.disabled)return;
  tinp.value='';autoResize();sbtn.disabled=true;
  addMsg('user',esc(text));
  history.push({role:'user',content:text});
  showThink();
  try{
    const messages=[
      {role:'system',content:SYSTEM},
      ...history.map(m=>({role:m.role,content:m.content}))
    ];
    // Pollinations.ai — completely free, no API key needed
    const res=await fetch('https://text.pollinations.ai/',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages,model:'openai-large',seed:-1})
    });
    if(!res.ok)throw new Error('Pollinations returned '+res.status);
    const reply=(await res.text()).trim();
    removeThink();
    addFr(reply);
    history.push({role:'assistant',content:reply});
    exchanges++;
    xcnt.textContent=`${exchanges} exchange${exchanges!==1?'s':''}`;
    speak(reply);
  }catch(e){
    removeThink();
    const err="Lost signal. Give it another go, boss.";
    addFr(err);speak(err);
    console.warn(e);
  }
  sbtn.disabled=false;tinp.focus();
}

sbtn.addEventListener('click',send);
tinp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
function autoResize(){tinp.style.height='auto';tinp.style.height=Math.min(tinp.scrollHeight,90)+'px'}
tinp.addEventListener('input',autoResize);

setTimeout(()=>{
  const boot=`${greeting()} FRIDAY online — all systems nominal. What do you need?`;
  addFr(boot);
  setTimeout(()=>speak(boot),300);
},400);
</script>
</body>
</html>
